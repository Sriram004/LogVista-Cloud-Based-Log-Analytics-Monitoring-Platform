apiVersion: apps/v1
kind: Deployment
metadata:
  name: logvista-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: logvista-api
  template:
    metadata:
      labels:
        app: logvista-api
    spec:
      containers:
        - name: api
          image: logvista-api:latest
          ports:
            - containerPort: 8000
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: logvista-api
spec:
  selector:
    app: logvista-api
  ports:
    - port: 80
      targetPort: 8000
